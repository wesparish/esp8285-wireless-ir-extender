[platformio]
default_envs = media-node, server-node

[env:base]
platform = espressif8266
board = esp8285
framework = arduino
monitor_speed = 115200
lib_deps =
    crankyoldgit/IRremoteESP8266

[env:media-node]
extends = env:base
build_flags =
    -D NODE_ROLE=ROLE_MEDIA

[env:server-node]
extends = env:base
build_flags =
    -D NODE_ROLE=ROLE_SERVER

; Flash this to a device to print its MAC address (used during initial setup)
[env:get-mac]
extends = env:base
build_src_filter = -<*> +<get_mac/>

[env:native]
platform = native
build_flags =
    -D UNIT_TEST
